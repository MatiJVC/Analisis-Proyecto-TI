version: '3.8'

# Credenciales sensibles: definir en un archivo .env en el mismo directorio
# (ver .env.example). No commitear .env con valores reales.
# Mínimo requerido: POSTGRES_PASSWORD, DATABASE_URL

services:
  redis:
    image: redis:7-alpine
    container_name: proyecto_ti_redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    networks:
      - proyecto_ti_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: proyecto_ti_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?La variable POSTGRES_PASSWORD es requerida}
      POSTGRES_DB: ${POSTGRES_DB:-proyecto_ti}
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proyecto_ti_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proyecto_ti_backend
    environment:
      # Dentro de Docker, postgres se resuelve por nombre de servicio
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@postgres:5432/proyecto_ti}
      DEBUG: "False"
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sistema-centralizado}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-account}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DISABLE_AUTH: "false"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proyecto_ti_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8080}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-sistema-centralizado}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-proyecto-analisis-ti}
    container_name: proyecto_ti_frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - proyecto_ti_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  proyecto_ti_network:
    driver: bridge
